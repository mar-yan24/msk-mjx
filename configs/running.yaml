env:
  model_path: "models/22muscle_2D/myoLeg22_2D_BASELINE.xml"
  n_frames: 5

task:
  target_velocity: 3.0

rewards:
  forward_reward_weight: 0.5
  velocity_tracking_weight: 1.5
  healthy_reward: 5.0
  ctrl_cost_weight: 0.05
  energy_cost_weight: 0.0
  symmetry_reward_weight: 0.0
  joint_limit_penalty_weight: 0.0
  posture_reward_weight: 0.0
  min_z: 0.8
  max_z: 2.0

solver:
  type: "rigid"
  tau_act: 0.015
  tau_deact: 0.060
  n_substeps: 4

training:
  algorithm: "ppo"
  n_envs: 2048
  total_timesteps: 50_000_000
  episode_length: 1000
  unroll_length: 10
  learning_rate: 3.0e-4
  n_minibatches: 32
  n_epochs: 4
  discount: 0.97
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_cost: 0.01
  value_loss_coef: 0.5
  max_grad_norm: 0.5
  normalize_observations: true
  reward_scaling: 1.0
  num_evals: 10
  seed: 0
  checkpoint_dir: "logs/checkpoints"
  log_dir: "logs"
  policy_hidden_layers: [256, 256]
  value_hidden_layers: [256, 256]
